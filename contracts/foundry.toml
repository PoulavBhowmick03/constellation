[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

[profile.integration]
eth_rpc_url = "https://forno.celo.org"

[etherscan]
# CeloScan API key, Etherscan-compatible endpoint (Celo mainnet, chainId 42220).
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api", chain = 42220 }
